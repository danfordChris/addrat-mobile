name: pesa_lending
description: Pesa Digital Lending - Tanzania Mobile App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.5
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  ipf_flutter_starter_pack:
    path: /Users/danfordchris/projects/iPF_Flutter_Starter_Pack.

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.6.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  flutter_secure_storage: ^10.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Icons
  hugeicons: ^0.0.7

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.20.0
  pin_code_fields: ^8.0.1
  fl_chart: ^0.68.0
  flutter_staggered_animations: ^1.1.1

  # Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # ML / Camera
  camera: ^0.11.0+2

  # Utils
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  connectivity_plus: ^6.0.5
  uuid: ^4.4.2
  logger: ^2.4.0
  google_mlkit_text_recognition: ^0.15.1
  toastification: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  freezed: ^2.5.7

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/svgs/
    - assets/videos/
    - assets/logo/
    - .env
  fonts:
    - family: HelveticaNeue
      fonts:
        - asset: assets/fonts/HelveticaNeueLight.otf
          weight: 400
        - asset: assets/fonts/HelveticaNeueRoman.otf
          weight: 500
        - asset: assets/fonts/HelveticaNeueMedium.otf
          weight: 600
        - asset: assets/fonts/HelveticaNeueBold.otf
          weight: 700
    - family: FiraCode
      fonts:
        - asset: assets/fonts/FiraCode-Regular.ttf
          weight: 500

flutter_intl:
  enabled: true
